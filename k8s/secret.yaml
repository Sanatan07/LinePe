apiVersion: v1
kind: Secret
metadata:
  name: linepe-secrets
  namespace: linepe
type: Opaque
stringData:
  MONGODB_URI: "mongodb://mongo:27017/linepe"
  POSTGRES_URL: "postgres://linepe:change-me@postgres:5432/linepe"
  JWT_SECRET: "change-me-access-secret"
  JWT_REFRESH_SECRET: "change-me-refresh-secret"
  CLOUDINARY_CLOUD_NAME: "change-me"
  CLOUDINARY_API_KEY: "change-me"
  CLOUDINARY_API_SECRET: "change-me"

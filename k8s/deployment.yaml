apiVersion: apps/v1
kind: Deployment
metadata:
  name: linepe
  namespace: linepe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linepe
  template:
    metadata:
      labels:
        app: linepe
    spec:
      containers:
        - name: linepe
          image: ghcr.io/owner/linepe:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: linepe-config
            - secretRef:
                name: linepe-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

apiVersion: v1
kind: ConfigMap
metadata:
  name: linepe-config
  namespace: linepe
data:
  NODE_ENV: "production"
  PORT: "5000"
  CLIENT_URL: "https://linepe.example.com"
  CLIENT_URLS: "https://linepe.example.com"
  COOKIE_SAME_SITE: "none"
  COOKIE_SECURE: "true"
  REDIS_URL: "redis://redis:6379"
  INVITE_BASE_URL: "https://linepe.example.com"

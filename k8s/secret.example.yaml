apiVersion: v1
kind: Secret
metadata:
  name: linepe-secrets
  namespace: linepe
type: Opaque
stringData:
  MONGODB_URI: "mongodb://mongo:27017/linepe"
  POSTGRES_URL: "postgres://linepe:replace-with-password@postgres:5432/linepe"
  JWT_SECRET: "replace-with-a-long-random-jwt-secret"
  JWT_REFRESH_SECRET: "replace-with-a-long-random-refresh-secret"
  CLOUDINARY_CLOUD_NAME: "replace-with-cloudinary-cloud-name"
  CLOUDINARY_API_KEY: "replace-with-cloudinary-api-key"
  CLOUDINARY_API_SECRET: "replace-with-cloudinary-api-secret"
